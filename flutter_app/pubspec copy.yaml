name: barfliz
description: Real-time social nightlife app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.0

  # Maps (placeholder for Phase 2, needed in pubspec now)
  google_maps_flutter: ^2.12.0

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
