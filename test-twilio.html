<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twilio SMS Test - Barfliz</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .result.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    .hint {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }
    .otp-display {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      text-align: center;
    }
    .otp-code {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Twilio SMS Test</h1>
    <p class="subtitle">Test the Twilio integration for Barfliz</p>

    <div id="step1" class="step active">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          placeholder="+61412345678"
          value="+61"
        />
        <div class="hint">Include country code (e.g., +61 for Australia, +1 for USA)</div>
      </div>
      <button onclick="sendOTP()">Send Verification Code</button>
    </div>

    <div id="step2" class="step">
      <div class="otp-display">
        <div style="font-size: 14px; color: #856404; margin-bottom: 10px;">
          Development Mode - OTP Code:
        </div>
        <div class="otp-code" id="otpCode">------</div>
        <div style="font-size: 12px; color: #856404; margin-top: 10px;">
          (Also sent to your phone)
        </div>
      </div>

      <div class="form-group">
        <label for="code">Enter Verification Code</label>
        <input
          type="text"
          id="code"
          placeholder="1234"
          maxlength="4"
        />
      </div>
      <button onclick="verifyOTP()">Verify Code</button>
      <button onclick="resetTest()" style="background: #6c757d; margin-top: 10px;">Start Over</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dedfdupxjqlurhzaqaru.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlZGZkdXB4anFsdXJoemFxYXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MTU5MjUsImV4cCI6MjA4NzA5MTkyNX0.uJSAr0lYkxKE7b2N1SRHC_aN9-DMvSuA-REWqHbGw-E';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let storedOtp = null;
    let testPhone = null;

    function showResult(message, type) {
      const result = document.getElementById('result');
      result.textContent = message;
      result.className = `result ${type}`;
      result.style.display = 'block';
    }

    async function sendOTP() {
      const phone = document.getElementById('phone').value.trim();

      if (!phone || phone.length < 10) {
        showResult('Please enter a valid phone number with country code', 'error');
        return;
      }

      testPhone = phone;
      const button = event.target;
      button.disabled = true;
      button.textContent = 'Sending...';

      showResult('Sending SMS...', 'info');

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/twilio-send-otp`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ phone })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to send OTP');
        }

        storedOtp = data.otp;
        document.getElementById('otpCode').textContent = storedOtp;

        showResult(`SMS sent successfully to ${phone}! Message SID: ${data.messageSid}`, 'success');

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');

      } catch (error) {
        showResult(`Error: ${error.message}`, 'error');
        button.disabled = false;
        button.textContent = 'Send Verification Code';
      }
    }

    async function verifyOTP() {
      const code = document.getElementById('code').value.trim();

      if (!code || code.length !== 4) {
        showResult('Please enter the 4-digit verification code', 'error');
        return;
      }

      const button = event.target;
      button.disabled = true;
      button.textContent = 'Verifying...';

      showResult('Verifying code...', 'info');

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/twilio-verify-otp`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({
            phone: testPhone,
            code: code,
            storedOtp: storedOtp
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Verification failed');
        }

        showResult('✓ Verification successful! Your phone number is verified.', 'success');
        button.textContent = 'Verified!';

      } catch (error) {
        showResult(`Error: ${error.message}`, 'error');
        button.disabled = false;
        button.textContent = 'Verify Code';
      }
    }

    function resetTest() {
      document.getElementById('step1').classList.add('active');
      document.getElementById('step2').classList.remove('active');
      document.getElementById('code').value = '';
      document.getElementById('result').style.display = 'none';
      storedOtp = null;
      testPhone = null;

      const buttons = document.querySelectorAll('button');
      buttons.forEach(btn => {
        btn.disabled = false;
        if (btn.textContent.includes('Send')) btn.textContent = 'Send Verification Code';
        if (btn.textContent.includes('Verify')) btn.textContent = 'Verify Code';
      });
    }
  </script>
</body>
</html>
