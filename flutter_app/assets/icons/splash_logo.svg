<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="splashGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F8F8F8;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Cocktail Glass Icon -->
  <g transform="translate(106, 56)">
    <!-- Glass Bowl -->
    <path d="M20 20 L280 20 L180 240 L120 240 Z"
          fill="url(#splashGlass)"
          stroke="#FFFFFF"
          stroke-width="8"
          stroke-linejoin="round"/>

    <!-- Liquid -->
    <path d="M55 85 L245 85 L172 220 L128 220 Z"
          fill="#FFB74D"
          opacity="0.85"/>

    <!-- Stem -->
    <rect x="133" y="240" width="34" height="80"
          fill="url(#splashGlass)"
          stroke="#FFFFFF"
          stroke-width="6"/>

    <!-- Base -->
    <ellipse cx="150" cy="330" rx="65" ry="16"
             fill="url(#splashGlass)"
             stroke="#FFFFFF"
             stroke-width="6"/>

    <!-- Garnish -->
    <circle cx="235" cy="50" r="32" fill="#FFD54F" stroke="#FFFFFF" stroke-width="5"/>
    <circle cx="235" cy="50" r="18" fill="#FFEB3B"/>

    <!-- Bubbles -->
    <circle cx="115" cy="150" r="10" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="165" cy="115" r="7" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="190" cy="165" r="8" fill="#FFFFFF" opacity="0.55"/>
  </g>
</svg>
