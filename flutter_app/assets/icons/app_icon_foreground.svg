<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Cocktail Glass (centered, no background) -->
  <g transform="translate(280, 200)">
    <!-- Glass Bowl -->
    <path d="M40 40 L424 40 L280 350 L184 350 Z"
          fill="url(#glassGrad)"
          stroke="#FFFFFF"
          stroke-width="12"
          stroke-linejoin="round"/>

    <!-- Liquid -->
    <path d="M85 130 L379 130 L270 320 L194 320 Z"
          fill="#FFB74D"
          opacity="0.85"/>

    <!-- Stem -->
    <rect x="208" y="350" width="48" height="110"
          fill="url(#glassGrad)"
          stroke="#FFFFFF"
          stroke-width="10"/>

    <!-- Base -->
    <ellipse cx="232" cy="480" rx="90" ry="22"
             fill="url(#glassGrad)"
             stroke="#FFFFFF"
             stroke-width="10"/>

    <!-- Garnish -->
    <circle cx="350" cy="85" r="45" fill="#FFD54F" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="350" cy="85" r="25" fill="#FFEB3B"/>

    <!-- Bubbles -->
    <circle cx="185" cy="220" r="14" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="255" cy="175" r="10" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="295" cy="250" r="11" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
